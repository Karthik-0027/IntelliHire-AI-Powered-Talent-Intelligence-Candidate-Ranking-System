ai_usage_summary: |
  Used ChatGPT/Codex to inspect the challenge bundle, implement the offline
  scorer, generate documentation, and validate the submission format. No hosted
  LLM or external API is called by the ranking code.

methodology_summary: |
  Deterministic hybrid ranker for the Senior AI Engineer JD. The core score
  prioritizes production evidence for embeddings, hybrid retrieval, vector
  search, ranking/evaluation, Python, and ML systems in product-company roles.
  Redrob behavioral signals then adjust for availability and hireability:
  recency, open-to-work, response rate, notice period, interview reliability,
  recruiter saves, verification, and GitHub activity. Penalties catch keyword
  stuffers, services-only histories, stale/unresponsive profiles, impossible
  skill-duration patterns, and CV/speech-heavy profiles without NLP/IR evidence.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
